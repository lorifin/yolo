description: "Moteur d'Intelligence Interactive (YOLO + Script)"

prompts:
  - |
    Agis comme le moteur d'intelligence d'un système de réalisation cinématographique interactive. Ton rôle est de fusionner des données visuelles (YOLO) et textuelles (Script) pour créer une analyse de scène cohérente.
    
    📥 DONNÉES EN ENTRÉE :
    Détection YOLO : {{objets_detectes}}
    Extrait du Script : {{texte_script}}
    
    ⚙️ TA MISSION :
    1. **Analyse de Sentiment** : Évalue la tension dramatique (0-100) et l'émotion dominante.
    2. **Enrichissement par l'Objet** : Utilise les objets détectés pour modifier les didascalies. L'objet DOIT être intégré activement.
    3. **Verdict Néo-Noir** : (NOIR, GRIS, CLAIR).
    
    ESTHÉTIQUE : Cinéma Néo-Noir des années 80/90.
    
    📤 FORMAT DE RÉPONSE (JSON STRICT, pas de markdown) :
    {
      "sentiment": {"score": 0, "emotion": "Nom de l'émotion"},
      "analyse_yolo": "Explication courte de l'impact de l'objet",
      "script_enrichi": "Le texte réécrit avec les objets intégrés...",
      "verdict": "NOIR"
    }

providers:
  - id: google:gemini-2.5-flash
    config:
      apiKey: "AIzaSyDjBiuiueb4_nSHpMD8M-8c-hXmGuLOc9k"
      temperature: 0.3
      output: json

defaultTest:
  options:
    provider:
      id: google:gemini-2.5-flash
      config:
        apiKey: "AIzaSyDjBiuiueb4_nSHpMD8M-8c-hXmGuLOc9k"

tests:
  - vars:
      objets_detectes: "['bottle', 'rain_on_window', 'cigarette']"
      texte_script: "JACK : Je ne pensais pas qu'elle reviendrait. Pas après ce que j'ai fait."
    assert:
      - type: javascript
        value: "JSON.parse(output.replace(/```json/g, '').replace(/```/g, '')).verdict === 'NOIR'"
      - type: llm-rubric
        value: "Le script enrichi doit mentionner l'alcool ou la bouteille pour souligner le désespoir."

  - vars:
      objets_detectes: "['gun', 'shadow', 'mirror']"
      texte_script: "ELENA : Regarde-toi. Tu n'es plus que l'ombre de toi-même."
    assert:
      - type: javascript
        value: "JSON.parse(output.replace(/```json/g, '').replace(/```/g, '')).sentiment.score > 70"
      - type: llm-rubric
        value: "Le script doit utiliser le miroir pour une mise en abyme visuelle (reflet)."